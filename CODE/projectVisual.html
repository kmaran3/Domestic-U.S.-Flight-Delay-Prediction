<html lang="en">
<head>
    <!-- import required libraries here -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flight Delay Prediction</title>
    <link rel="stylesheet" href = "styles.css">

    
</head>

<body>
    <!-- Header -->
    <header>
        <h1 class = 'title' style="text-align: center;">Domestic U.S. Flight Delay Prediction</h1>
    </header>

    <main>
        <hr>
        <!-- Dropdown Options -->
        <section id="dropdowns">
            <!-- Airlines Dropdown -->
            <div>
                <label class = "dropdown-label">Select Airline:</label>
                <select id = "airlineDropdown">
                <option value = "" disabled selected>-</option>
                <option value = "AS">Alaska Airlines</option>
                <option value = "G4">Allegiant Air</option>
                <option value = "AA">American Airlines</option>
                <option value = "DL">Delta Airlines</option>
                <option value = "9E">Endeavor Air</option>
                <option value = "MQ">Envoy Air</option>
                <option value = "EV">ExpressJet Airlines</option>
                <option value = "F9">Frontier Airlines</option>
                <option value = "HA">Hawaiian Airlines</option>
                <option value = "QX">Horizon Air</option>
                <option value = "B6">JetBlue</option>
                <option value = "YV">Mesa Airlines</option>
                <option value = "OH">PSA Airlines</option>
                <option value = "YX">Republic Airlines</option>
                <option value = "OO">SkyWest Airlines</option>
                <option value = "WN">Southwest Airlines</option>
                <option value = "NK">Spirit Airlines</option>
                <option value = "UA">United Airlines</option>
                </select>
            </div>
            
            <!-- Airport Dropdown -->
            <div>
                <label class = "dropdown-label">Select Airport:</label>
                <select id = "airportDropdown" style = "margin-top: 10px;">
                <option value = "" disabled selected>-</option>
                <option value = "ABQ">Albuquerque</option>
                <option value = "ANC">Anchorage</option>
                <option value = "ATL">Atlanta</option>
                <option value = "AUS">Austin</option>
                <option value = "BWI">Baltimore</option>
                <option value = "BOI">Boise</option>
                <option value = "BOS">Boston</option>
                <option value = "BUR">Burbank</option>
                <option value = "CHS">Charleston</option>
                <option value = "CLT">Charlotte</option>
                <option value = "MDW">Chicago - MDW</option>
                <option value = "ORD">Chicago - ORD</option>
                <option value = "CVG">Cincinnati</option>
                <option value = "CLE">Cleveland</option>
                <option value = "CMH">Columbus</option>
                <option value = "DAL">Dallas</option>
                <option value = "DFW">Dallas-Fort Worth</option>
                <option value = "DEN">Denver</option>
                <option value = "DTW">Detroit</option>
                <option value = "FLL">Fort Lauderdale</option>
                <option value = "RSW">Fort Meyers</option>
                <option value = "BDL">Hartford</option>
                <option value = "HNL">Honolulu</option>
                <option value = "HOU">Houston - HOU</option>
                <option value = "IAH">Houston - IAH</option>
                <option value = "IND">Indianapolis</option>
                <option value = "JAX">Jacksonville</option>
                <option value = "OGG">Kahului</option>
                <option value = "MCI">Kansas City</option>
                <option value = "LAS">Las Vegas</option>
                <option value = "LAX">Los Angeles</option>
                <option value = "MEM">Memphis</option>
                <option value = "MIA">Miami</option>
                <option value = "MKE">Milwaukee</option>
                <option value = "MSP">Minneapolis-St. Paul</option>
                <option value = "BNA">Nashville</option>
                <option value = "MSY">New Orleans</option>
                <option value = "JFK">New York City - JFK</option>
                <option value = "LGA">New York City - LGA</option>
                <option value = "EWR">Newark</option>
                <option value = "OAK">Oakland</option>
                <option value = "OMA">Omaha</option>
                <option value = "ONT">Ontario</option>
                <option value = "MCO">Orlando</option>
                <option value = "PHL">Philadelphia</option>
                <option value = "PHX">Phoenix</option>
                <option value = "PIT">Pittsburgh</option>
                <option value = "PDX">Portland</option>
                <option value = "RDU">Raleigh</option>
                <option value = "RNO">Reno</option>
                <option value = "SMF">Sacremento</option>
                <option value = "SLC">Salt Lake City</option>
                <option value = "SAT">San Antonio</option>
                <option value = "SAN">San Diego</option>
                <option value = "SFO">San Francisco</option>
                <option value = "SJC">San Jose</option>
                <option value = "SNA">Santa Ana</option>
                <option value = "SEA">Seattle-Tacoma</option>
                <option value = "STL">St. Louis</option>
                <option value = "DCA">Washington D.C. - DCA</option>
                <option value = "IAD">Washington D.C. - IAD</option>
                <option value = "PBI">West Palm Beach</option>
                </select>
            </div>
            
            <!-- Month Dropdown -->
            <div>
                <label class = "dropdown-label">Select Month:</label>
                <select id = "monthDropdown" style = "margin-top: 10px;">
                <option value = "" disabled selected>-</option>
                <option value = "1">January</option>
                <option value = "2">February</option>
                <option value = "3">March</option>
                <option value = "4">April</option>
                <option value = "5">May</option>
                <option value = "6">June</option>
                <option value = "7">July</option>
                <option value = "8">August</option>
                <option value = "9">September</option>
                <option value = "10">October</option>
                <option value = "11">November</option>
                <option value = "12">December</option>
                </select>
            </div>
        </section>

        <!-- Submit button for dropdowns -->
        <button id="submitButton">Submit</button>

        <!-- Delay Prediction Box -->
        <section id="predictionBox">
            <p id="predictionText">Predicted Delay: <span id="predictedDelay">N/A</span></p>
            <p id="cancellationText">Cancellation Probability: <span id="predictedCancel">N/A</span></p>
        </section>        
    </main>
    
    <!-- Data source caption -->
    <footer>
        <div id="data-source">
            <p>All data is sourced from the United States Bureau of Transportation Statistics.</p>
            <p>All calculations are estimates and may not be 100% accurate.</p>
        </div>
    </footer>

    <!-- ----------- -->
    <!-- Start of D3 -->
    <!-- ----------- -->
    <script type="text/javascript" src="lib/d3.v5.min.js"></script>
    <script type="text/javascript" src="lib/d3-legend.min.js"></script>
    <script type="text/javascript" src="lib/d3-tip.min.js"></script>
        
    <script>
        //--------------------------------------------------
        //Reading Prediction Box Data and Displaying Results
        //--------------------------------------------------

        // Airline and airport display name mappings
        const airlineNames = {
            "AS":"Alaska Airlines","G4":"Allegiant Air","AA":"American Airlines",
            "DL":"Delta Airlines","9E":"Endeavor Air","MQ":"Envoy Air",
            "EV":"ExpressJet Airlines","F9":"Frontier Airlines","HA":"Hawaiian Airlines",
            "QX":"Horizon Air","B6":"JetBlue","YV":"Mesa Airlines",
            "OH":"PSA Airlines","YX":"Republic Airlines","OO":"SkyWest Airlines",
            "WN":"Southwest Airlines","NK":"Spirit Airlines","UA":"United Airlines"
        };
        const airportNames = {
            "ABQ":"Albuquerque","ANC":"Anchorage","ATL":"Atlanta","AUS":"Austin",
            "BWI":"Baltimore","BOI":"Boise","BOS":"Boston","BUR":"Burbank",
            "CHS":"Charleston","CLT":"Charlotte","MDW":"Chicago - MDW","ORD":"Chicago - ORD",
            "CVG":"Cincinnati","CLE":"Cleveland","CMH":"Columbus","DAL":"Dallas",
            "DFW":"Dallas-Fort Worth","DEN":"Denver","DTW":"Detroit","FLL":"Fort Lauderdale",
            "RSW":"Fort Meyers","BDL":"Hartford","HNL":"Honolulu","HOU":"Houston - HOU",
            "IAH":"Houston - IAH","IND":"Indianapolis","JAX":"Jacksonville","OGG":"Kahului",
            "MCI":"Kansas City","LAS":"Las Vegas","LAX":"Los Angeles","MEM":"Memphis",
            "MIA":"Miami","MKE":"Milwaukee","MSP":"Minneapolis-St. Paul","BNA":"Nashville",
            "MSY":"New Orleans","JFK":"New York City - JFK","LGA":"New York City - LGA",
            "EWR":"Newark","OAK":"Oakland","OMA":"Omaha","ONT":"Ontario","MCO":"Orlando",
            "PHL":"Philadelphia","PHX":"Phoenix","PIT":"Pittsburgh","PDX":"Portland",
            "RDU":"Raleigh","RNO":"Reno","SMF":"Sacremento","SLC":"Salt Lake City",
            "SAT":"San Antonio","SAN":"San Diego","SFO":"San Francisco","SJC":"San Jose",
            "SNA":"Santa Ana","SEA":"Seattle-Tacoma","STL":"St. Louis",
            "DCA":"Washington D.C. - DCA","IAD":"Washington D.C. - IAD","PBI":"West Palm Beach"
        };
        const monthNames = {
            "1":"January","2":"February","3":"March","4":"April","5":"May","6":"June",
            "7":"July","8":"August","9":"September","10":"October","11":"November","12":"December"
        };

        //Load CSV File
        const flightData = d3.csv("flightdata_delay_and_cancellation.csv");

        flightData.then(function(data) {

            //Define data
            window.flightData = data;

            // Build index of valid combinations
            const validCombos = {};
            data.forEach(function(d) {
                var key = d.AIRLINE_CODE + "," + d.ORIGIN_CODE;
                if (!validCombos[d.AIRLINE_CODE]) validCombos[d.AIRLINE_CODE] = {};
                if (!validCombos[d.AIRLINE_CODE][d.ORIGIN_CODE]) validCombos[d.AIRLINE_CODE][d.ORIGIN_CODE] = [];
                validCombos[d.AIRLINE_CODE][d.ORIGIN_CODE].push(d.Month_of_Travel);
            });

            var airlineDropdown = document.getElementById("airlineDropdown");
            var airportDropdown = document.getElementById("airportDropdown");
            var monthDropdown = document.getElementById("monthDropdown");

            // Populate airline dropdown with all airlines that have data
            function populateAirlines() {
                airlineDropdown.innerHTML = '<option value="" disabled selected>-</option>';
                var airlines = Object.keys(validCombos).sort();
                airlines.forEach(function(code) {
                    if (airlineNames[code]) {
                        var opt = document.createElement("option");
                        opt.value = code;
                        opt.textContent = airlineNames[code];
                        airlineDropdown.appendChild(opt);
                    }
                });
            }

            // Populate airport dropdown based on selected airline
            function populateAirports(airline) {
                airportDropdown.innerHTML = '<option value="" disabled selected>-</option>';
                monthDropdown.innerHTML = '<option value="" disabled selected>-</option>';
                if (!airline || !validCombos[airline]) return;
                var airports = Object.keys(validCombos[airline]).filter(function(code) {
                    return airportNames[code];
                }).sort(function(a, b) {
                    return airportNames[a].localeCompare(airportNames[b]);
                });
                airports.forEach(function(code) {
                    var opt = document.createElement("option");
                    opt.value = code;
                    opt.textContent = airportNames[code];
                    airportDropdown.appendChild(opt);
                });
            }

            // Populate month dropdown based on selected airline + airport
            function populateMonths(airline, airport) {
                monthDropdown.innerHTML = '<option value="" disabled selected>-</option>';
                if (!airline || !airport || !validCombos[airline] || !validCombos[airline][airport]) return;
                var months = validCombos[airline][airport].sort(function(a, b) {
                    return parseInt(a) - parseInt(b);
                });
                months.forEach(function(m) {
                    var opt = document.createElement("option");
                    opt.value = m;
                    opt.textContent = monthNames[m];
                    monthDropdown.appendChild(opt);
                });
            }

            populateAirlines();

            airlineDropdown.addEventListener("change", function() {
                populateAirports(this.value);
                document.getElementById("predictionBox").style.display = "none";
            });
            airportDropdown.addEventListener("change", function() {
                populateMonths(airlineDropdown.value, this.value);
                document.getElementById("predictionBox").style.display = "none";
            });
            monthDropdown.addEventListener("change", function() {
                document.getElementById("predictionBox").style.display = "none";
            });

            function submitForm() {
                //Get submitted parameters from dropdowns
                const selectedAirline = airlineDropdown.value;
                const selectedAirport = airportDropdown.value;
                const selectedMonth = monthDropdown.value;

                if (!selectedAirline || !selectedAirport || !selectedMonth) return;

                //Get filtered data
                const filteredData = data.filter(function(d) {
                    return d.AIRLINE_CODE === selectedAirline &&
                           d.ORIGIN_CODE === selectedAirport &&
                           d.Month_of_Travel === selectedMonth;
                });

                // Display prediction results
                var predictionBox = document.getElementById("predictionBox");
                var predictedDelayElem = document.getElementById("predictedDelay");
                var predictedCancelElem = document.getElementById("predictedCancel");

                if (filteredData.length === 0) {
                    predictedDelayElem.textContent = "Not Available";
                    predictedCancelElem.textContent = "Not Available";
                } else {
                    var averageDelay = parseFloat(filteredData[0].Predicted_Delay_Time);
                    var cancelProb = parseFloat(filteredData[0].Cancellation_Probability) * 100;
                    predictedDelayElem.textContent = averageDelay.toFixed(2) + " minutes";
                    predictedCancelElem.textContent = (cancelProb === 0) ? "0.0%" : cancelProb.toFixed(2) + "%";
                }
                predictionBox.style.display = "block";
            }

            document.getElementById("submitButton").addEventListener("click", submitForm);
        }).catch(function(error) {
            console.log(error);
        });


        //--------------------------------------------------
        //Creating US map and top 5 tooltip
        //--------------------------------------------------

        // Margins for SVG containing US Map
        var w = 900;
        var h = 700;

        // Define SVG
        var svg = d3.select("body")
            .append("svg")
            .attr("id", "map")
            .attr("width", w)
            .attr("height", h);

        // Define top 5 tooltip
        var tip = d3.select("body").append("div").attr("id", "tooltip").attr("class", "hidden");

        // Track whether tooltip is pinned by click
        var tooltipPinned = false;

        //define US map projections
        var projection = d3.geoAlbersUsa();
        var path = d3.geoPath()
            .projection(projection);

        // Read in data as global variable
        var map = d3.json("usa_map.json");
        var cities = d3.csv("airports.csv");

        Promise.all([map, cities]).then(function(values) {
            ready(values[0], values[1]);
        });

        function ready(map, cities) {
            createMapAndLegend(map, cities);
        }

        function createMapAndLegend(map, cities) {
            svg.selectAll("*").remove();
            svg.append("g")
                .attr("id", "countries")
                .selectAll("path")
                .data(map.features)
                .enter()
                .append("path")
                .attr("class", "state")
                .attr("d", path);

            svg.append("g")
                .attr("id", "airports")
                .selectAll("circle")
                .data(cities)
                .enter()
                .append("circle")
                .attr("class", "city")
                .attr("cx", function(d) { return projection([d.lon, d.lat])[0]; })
                .attr("cy", function(d) { return projection([d.lon, d.lat])[1]; })
                .attr("r", 4)
                .attr("id", function(d) { return d.code; })
                // Show tooltip on hover (only if not pinned)
                .on("mouseover", function(d) {
                    if (!tooltipPinned) {
                        showTooltip(d, event);
                    }
                })
                // Hide tooltip on mouseout (only if not pinned)
                .on("mouseout", function() {
                    if (!tooltipPinned) {
                        hideTooltip();
                    }
                })
                // Pin/unpin tooltip on click
                .on("click", function(d) {
                    if (tooltipPinned) {
                        // Unpin and show new tooltip for clicked city
                        hideTooltip();
                        tooltipPinned = false;
                        showTooltip(d, event);
                        tooltipPinned = true;
                    } else {
                        // Pin the current tooltip
                        tooltipPinned = true;
                    }
                });
        }

        function showTooltip(d, event) {
            d3.select("#tooltip")
                .style("top", (event.pageY + 10) + "px")
                .style("left", (event.pageX + 10) + "px");
            d3.select("#tooltip").selectAll("*").remove();
            d3.select("#tooltip")
                .append("text")
                .attr("id", "station")
                .text(d.code);
            d3.select("#tooltip").classed("hidden", false);
            ToolTip(d.code);
        }

        function hideTooltip() {
            d3.select("#tooltip").classed("hidden", true);
            d3.select("#tooltip").selectAll("*").remove();
        }

        //--------------------------------------------------
        //Function to define top 5 tool tip
        //--------------------------------------------------
        function ToolTip(airportCode) {
            d3.csv("expected_delay_by_airline_and_airport.csv").then(function(data) {
                const airportData = data.filter(function(d) {
                    return d.ORIGIN_CODE === airportCode && d.EXPECTED_DELAY > 0;
                });
                airportData.sort(function(a, b) { return a.EXPECTED_DELAY - b.EXPECTED_DELAY; });
                const topAirlines = airportData.slice(0, 5);

                const svgWidth = 300;
                const svgHeight = 200;
                const margin = { top: 50, right: 50, bottom: 50, left: 50 };
                const width = svgWidth - margin.left - margin.right;
                const height = svgHeight - margin.top - margin.bottom;

                const tSvg = d3.select("#tooltip")
                    .classed("hidden", false)
                    .append("svg")
                    .attr("width", svgWidth)
                    .attr("height", svgHeight)
                    .append("g")
                    .attr("transform", "translate(" + margin.left + "," + margin.top / 2 + ")")
                    .style("z-index", "9999");

                const x = d3.scaleBand()
                    .range([0, width])
                    .padding(0.1)
                    .domain(topAirlines.map(function(d) { return d.AIRLINE_CODE; }));

                const y = d3.scaleLinear()
                    .range([height, 0])
                    .domain([0, 1.1 * d3.max(topAirlines, function(d) { return parseFloat(d.EXPECTED_DELAY); })]);

                tSvg.selectAll(".bar")
                    .data(topAirlines)
                    .enter().append("rect")
                    .attr("class", "bar")
                    .attr("id", function(d) { return d.AIRLINE_CODE; })
                    .attr("x", function(d) { return x(d.AIRLINE_CODE); })
                    .attr("width", x.bandwidth())
                    .attr("y", function(d) { return y(d.EXPECTED_DELAY); })
                    .attr("height", function(d) { return height - y(d.EXPECTED_DELAY); });

                tSvg.append("g")
                    .attr("transform", "translate(0," + height + ")")
                    .call(d3.axisBottom(x));

                tSvg.append("g")
                    .call(d3.axisLeft(y));

                tSvg.append("text")
                    .attr("x", width / 2)
                    .attr("y", height + margin.top)
                    .style("text-anchor", "middle")
                    .text("Airline");

                tSvg.append("text")
                    .attr("transform", "rotate(-90)")
                    .attr("y", 0 - margin.left)
                    .attr("x", 0 - (height / 2))
                    .attr("dy", "1em")
                    .style("text-anchor", "middle")
                    .text("Expected Delay");

            }).catch(function(error) {
                console.log(error);
            });
        }

        // Dismiss pinned tooltip when clicking outside a city
        document.addEventListener("click", function(event) {
            if (!event.target.classList.contains("city")) {
                tooltipPinned = false;
                hideTooltip();
            }
        });

        // Hide hover tooltip when mouse leaves a city (but not if pinned)
        document.addEventListener("mousemove", function(event) {
            if (!tooltipPinned && !event.target.classList.contains("city")) {
                hideTooltip();
            }
        });

    </script>

</body>
</html>
